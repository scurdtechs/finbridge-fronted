<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinBridge - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Dashboard</h1>
    <p class="developer-tag">Developed by Scurd Sammy</p>
    <button id="logoutBtn">Logout</button>

    <h2 id="balance">Balance: KES 0</h2>

    <div class="form-container">
        <h3>Deposit</h3>
        <form id="depositForm">
            <input type="number" id="depositAmount" placeholder="Amount" required>
            <button type="submit">Deposit</button>
        </form>

        <h3>Send Money</h3>
        <form id="sendForm">
            <input type="text" id="receiverPhone" placeholder="Receiver Phone" required>
            <input type="number" id="sendAmount" placeholder="Amount" required>
            <button type="submit">Send</button>
        </form>

        <h3>Loan Request</h3>
        <form id="loanForm">
            <input type="number" id="loanAmount" placeholder="Loan Amount" required>
            <button type="submit">Request Loan</button>
        </form>

        <h3>Savings Goals</h3>
        <form id="goalForm">
            <input type="text" id="goalName" placeholder="Goal Name" required>
            <input type="number" id="goalAmount" placeholder="Target Amount" required>
            <button type="submit">Add Goal</button>
        </form>

        <h3>Mini-Game: Click the Blue Button!</h3>
        <button id="gameBtn">Click Me!</button>
        <p>Points: <span id="gamePoints">0</span></p>
    </div>

    <h3>Transactions</h3>
    <table id="transactionTable"></table>

    <h3>Savings Goals</h3>
    <table id="goalTable"></table>

    <h3>Leaderboard</h3>
    <table id="leaderboardTable"></table>

    <script src="script.js"></script>
</body>
</html>
