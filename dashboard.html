<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinBridge - Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Dashboard</h1>
    <button id="logoutBtn">Logout</button>

    <h2 id="balance">Balance: KES 0</h2>

    <div class="form-container">
        <h3>Deposit</h3>
        <form id="depositForm">
            <input type="number" id="depositAmount" placeholder="Amount" required>
            <button type="submit">Deposit</button>
        </form>

        <h3>Send Money</h3>
        <form id="sendForm">
            <input type="text" id="receiverPhone" placeholder="Receiver Phone" required>
            <input type="number" id="sendAmount" placeholder="Amount" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <h3>Transactions</h3>
    <table id="transactionTable"></table>

    <script src="script.js"></script>
</body>
</html>
