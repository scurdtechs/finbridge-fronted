<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinBridge Dashboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <h1>Welcome, <span id="userName"></span></h1>
        <button id="logoutBtn">Logout</button>
    </div>

    <p class="welcome-message">Hello <span id="userName"></span>! Thank you for using FinBridge – your secure financial assistant.</p>

    <h2 id="balance">Balance: 0</h2>

    <div class="wallet-section">
        <h3>Deposit Money</h3>
        <form id="depositForm">
            <input type="number" id="depositAmount" placeholder="Amount" required>
            <button type="submit">Deposit</button>
        </form>
    </div>

    <div class="wallet-section">
        <h3>Send Money</h3>
        <form id="sendForm">
            <input type="text" id="receiverPhone" placeholder="Receiver Phone" required>
            <input type="number" id="sendAmount" placeholder="Amount" required>
            <button type="submit">Send</button>
        </form>
    </div>

    <div class="transactions-section">
        <h3>Transactions History</h3>
        <table id="transactionTable">
            <tr><th>Sender</th><th>Receiver</th><th>Amount</th><th>Date</th></tr>
        </table>
    </div>

    <p class="footer-message">Developed by <strong>Scurd Sammy</strong>, vision: improving financial systems worldwide.</p>
</div>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "41.index.html";
    document.getElementById("userName").innerText = localStorage.getItem("name");
    getWalletBalance();
    getTransactions();
});
</script>
</body>
</html>
