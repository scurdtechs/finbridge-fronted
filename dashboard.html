<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinBridge Dashboard</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="dashboard-container" data-page="dashboard">
      <header class="header">
        <div class="header-left">
          <h1>FinBridge</h1>
          <div class="profile" id="profileSummary">Loading...</div>
        </div>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </header>

      <div class="layout">
        <nav class="sidebar">
          <ul class="nav-list">
            <li><button class="nav-link" data-module="wallet">Wallet</button></li>
            <li><button class="nav-link" data-module="loans">Loans</button></li>
            <li><button class="nav-link" data-module="study">FinStudy</button></li>
            <li><button class="nav-link" data-module="library">FinLibrary</button></li>
            <li><button class="nav-link" data-module="market">FinMarket</button></li>
            <li><button class="nav-link" data-module="gram">FinGram</button></li>
            <li><button class="nav-link" data-module="events">Events</button></li>
            <li><button class="nav-link" data-module="health">Health</button></li>
            <li><button class="nav-link" data-module="mentorship">Mentorship</button></li>
            <li><button class="nav-link" data-module="ai">AI Tools</button></li>
            <li><button class="nav-link" data-module="groups">Groups</button></li>
            <li><button class="nav-link" data-module="entertainment">Entertainment</button></li>
            <li><button class="nav-link" data-module="volunteer">Volunteer</button></li>
            <li><button class="nav-link" data-module="devices">Device Sharing</button></li>
            <li><button class="nav-link" data-module="arvr">AR/VR Rooms</button></li>
            <li><button class="nav-link" data-module="offline">Offline Tools</button></li>
            <li><button class="nav-link" data-module="smartstudy">Smart Study</button></li>
            <li><button class="nav-link" data-module="gamification">Gamification</button></li>
            <li><button class="nav-link" data-module="notifications">Notifications</button></li>
            <li><button class="nav-link" data-module="admin">Admin</button></li>
          </ul>
        </nav>

        <main class="content">
          <div id="mainContent" class="content-inner">
            <div class="empty-state">
              Select a module from the left menu.
            </div>
          </div>
        </main>
      </div>
    </div>
    <footer class="built-by">Built by <strong>scurd sammy</strong></footer>
    <script src="../script.js"></script>
  </body>
</html>
