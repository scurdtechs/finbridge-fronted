<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FinBridge | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="getWalletBalance(); getTransactions();">

<h1>Welcome, <span id="userName"></span></h1>
<button id="logoutBtn">Logout</button>

<!-- WALLET BALANCE -->
<h2 id="balance">Balance: KES 0</h2>

<!-- DEPOSIT -->
<h3>Deposit Money</h3>
<form id="depositForm">
    <input type="number" id="depositAmount" placeholder="Amount" required>
    <button type="submit">Deposit</button>
</form>

<!-- SEND MONEY -->
<h3>Send Money</h3>
<form id="sendForm">
    <input type="text" id="receiverPhone" placeholder="Receiver Phone" required>
    <input type="number" id="sendAmount" placeholder="Amount" required>
    <button type="submit">Send</button>
</form>

<!-- TRANSACTIONS TABLE -->
<h3>Transactions</h3>
<table id="transactionTable" border="1">
    <tr>
        <th>Sender</th>
        <th>Receiver</th>
        <th>Amount</th>
        <th>Date</th>
    </tr>
</table>

<script src="script.js"></script>
<script>
    // Set user name from localStorage
    const name = localStorage.getItem("name");
    if (name) document.getElementById("userName").innerText = name;
</script>
</body>
</html>
