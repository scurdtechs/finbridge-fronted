<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinBridge - Login / Register</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

    <!-- Welcoming Banner -->
    <div class="welcome-banner">
        <h2>Welcome to FinBridge!</h2>
        <p>This system was developed by <strong>Scurd Sammy</strong>, a popular software engineer with a vision to improve financial systems.</p>
    </div>

    <!-- LOGIN -->
    <div class="form-section">
        <h3>Login</h3>
        <form id="loginForm">
            <input type="text" id="loginPhone" placeholder="Phone" required>
            <input type="password" id="loginPassword" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>

    <!-- REGISTER -->
    <div class="form-section">
        <h3>Register</h3>
        <form id="registerForm">
            <input type="text" id="regName" placeholder="Name" required>
            <input type="email" id="regEmail" placeholder="Email" required>
            <input type="text" id="regPhone" placeholder="Phone" required>
            <input type="password" id="regPassword" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>
    </div>

</div>
<script src="script.js"></script>
</body>
</html>
