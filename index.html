<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FinBridge Login</title>
    <link rel="stylesheet" href="../style.css" />
  </head>
  <body>
    <div class="container" data-page="login">
      <h1>FinBridge</h1>

      <div class="card">
        <h2 class="card-title">Login</h2>
        <form id="loginForm">
          <input type="text" id="phone" placeholder="Phone" required />
          <input type="password" id="password" placeholder="Password" required />
          <button type="submit" class="btn btn-primary">Login</button>
        </form>
        <p class="muted" style="margin-top: 12px;">
          Don't have an account?
          <a href="./register.html">Register</a>
        </p>
        <button id="forgotToggle" class="btn btn-link" type="button">Forgot password?</button>
        <div id="forgotSection" class="hidden">
          <div style="display: grid; gap: 10px; margin-top: 10px;">
            <input type="text" id="forgotPhone" placeholder="Phone (optional)" />
            <input type="email" id="forgotEmail" placeholder="Email (optional)" />
            <button id="forgotBtn" class="btn btn-secondary" type="button">Generate Reset Token</button>
            <div class="message" id="forgotMsg"></div>
          </div>
          <hr class="divider" />
          <div style="display: grid; gap: 10px;">
            <input type="text" id="resetToken" placeholder="Reset token from server console" />
            <input type="password" id="newPassword" placeholder="New password" />
            <button id="resetBtn" class="btn btn-primary" type="button">Reset Password</button>
          </div>
        </div>
      </div>

      <div class="message" id="loginMsg"></div>
    </div>
    <footer class="built-by">Built by <strong>scurd sammy</strong></footer>
    <script src="../script.js"></script>
  </body>
</html>
